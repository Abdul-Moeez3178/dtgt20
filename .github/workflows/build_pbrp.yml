name: Build PitchBlack Recovery (X6871)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'device_tree/**'
      - '.github/workflows/build_pbrp.yml'

jobs:
  build:
    name: Build PBRP
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Checkout Device Tree
      uses: actions/checkout@v4
      with:
        path: workspace

    - name: Cleanup Disk Space
      run: |
        sudo apt-get clean
        docker rmi $(docker images -q) || true
        sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android
        sudo rm -rf /opt/ghc /usr/local/share/boost /usr/local/share/powershell
        df -h

    - name: Set up Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python-is-python3
        # Fix for missing libncurses5 on newer Ubuntu
        sudo apt-get install -y libncurses5 libtinfo5 || (
          wget http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
          wget http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libncurses5_6.3-2ubuntu0.1_amd64.deb
          sudo apt install ./libtinfo5_6.3-2ubuntu0.1_amd64.deb ./libncurses5_6.3-2ubuntu0.1_amd64.deb
          rm libtinfo5_6.3-2ubuntu0.1_amd64.deb libncurses5_6.3-2ubuntu0.1_amd64.deb
        )

    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Initialize PBRP Workspace
      run: |
        mkdir -p $GITHUB_WORKSPACE/pbrp
        cd $GITHUB_WORKSPACE/pbrp
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        repo init -u https://github.com/PitchBlackRecoveryProject/manifest_pb -b android-12.1 --depth=1

    - name: Repo Sync
      run: |
        cd $GITHUB_WORKSPACE/pbrp
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Set up Device Tree
      run: |
        cd $GITHUB_WORKSPACE/workspace
        chmod +x setup_device_tree.sh
        ./setup_device_tree.sh $GITHUB_WORKSPACE/pbrp

    - name: Build PitchBlack Recovery
      run: |
        cd $GITHUB_WORKSPACE/pbrp
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch pb_X6871-userdebug
        mka vendorbootimage -j$(nproc --all)

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PBRP-X6871
        path: |
          ${{ github.workspace }}/pbrp/out/target/product/X6871/vendor_boot.img
          ${{ github.workspace }}/pbrp/out/target/product/X6871/PitchBlack*.zip
